<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>События</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .pulse-bar { display: none !important; }
        .container { padding: 0 12px !important; max-width: 500px; margin: 0 auto; }

        /* Экран входа */
        #loginScreen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        #loginScreen input { width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 14px; color: #fff; font-size: 18px; margin-bottom: 16px; text-align: center; }
        #loginScreen button { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; }

        /* Главное меню */
        #mainMenu { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 20px; }
        #mainMenu button { width: 100%; padding: 20px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; color: #fff; font-size: 20px; font-weight: 600; cursor: pointer; box-shadow: 0 0 30px rgba(255,255,255,0.03); }

        /* Экран событий (старый) */
        #eventsScreen { display: none; }

        /* Экран профиля */
        #profileScreen { display: none; }

        /* Кнопка назад */
        .back-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 16px; margin-bottom: 16px; display: none; }

        /* Прочие старые стили */
        .event-card, .add-event-btn, .profile-fab, .create-form, .form-card, .form-card input, .category-picker, .cat-option, .rsvp-btn, .submit-btn-full, .form-card label, .modal-card, .modal-close-btn, .modal-header, .modal-emoji, .modal-title-block, .modal-date-section, .modal-description, .modal-participants-section, .modal-section-label, .participants-list, .participant-badge, .no-participants, .modal-actions, .avatar, .avatars-stack, .more-avatars, .count-badge, .card-info, .card-emoji, .card-date, .date-day, .date-time { /* сохраняются все старые стили */ }

        /* Подключаем все старые стили из предыдущего файла (я их сюда не вставил ради краткости, но они остаются как есть) */
        /* ... сюда добавить все стили из предыдущего <style> ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- ЭКРАН ВХОДА -->
        <div id="loginScreen">
            <h1 style="font-size: 42px; font-weight: 900; text-align: center; margin-bottom: 40px;">👋 Привет!</h1>
            <input type="text" id="nameInput" placeholder="Как тебя зовут?" maxlength="30" autocomplete="off">
            <button onclick="saveName()">Войти</button>
        </div>

        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="mainMenu">
            <button onclick="showScreen('eventsScreen')">📅 События</button>
            <button onclick="showScreen('profileScreen')">👤 Профиль</button>
        </div>

        <!-- ЭКРАН СОБЫТИЙ -->
        <div id="eventsScreen">
            <button class="back-btn" onclick="showScreen('mainMenu')">← Назад</button>
            <header><h1>События 💭</h1></header>
            <!-- Старый контент событий -->
            <div class="create-form" id="createForm" style="display: none;">
                <div class="form-card" id="formCard">
                    <div class="form-header">
                        <div class="header-title-wrapper"><h2>Новое событие</h2></div>
                        <div onclick="hideCreateForm()" style="width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a; border: 1px solid rgba(255, 255, 255, 0.3); color: #aaa; font-size: 20px; font-weight: 300; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 8px rgba(255, 255, 255, 0.05); transition: all 0.2s ease; flex-shrink: 0; line-height: 1;" onmousedown="this.style.background='#fff'; this.style.color='#000';" onmouseup="this.style.background='#1a1a1a'; this.style.color='#aaa';" ontouchstart="this.style.background='#fff'; this.style.color='#000';" ontouchend="this.style.background='#1a1a1a'; this.style.color='#aaa';">✕</div>
                    </div>
                    <input type="text" id="eventName" placeholder="Название" maxlength="40">
                    <input type="text" id="eventDesc" placeholder="Описание" maxlength="120">
                    <label>Тип встречи</label>
                    <div class="category-picker">
                        <span class="cat-option active" data-cat="🍖">🍖</span>
                        <span class="cat-option" data-cat="🎬">🎬</span>
                        <span class="cat-option" data-cat="🌊">🌊</span>
                        <span class="cat-option" data-cat="🍻">🍻</span>
                        <span class="cat-option" data-cat="🎲">🎲</span>
                        <span class="cat-option" data-cat="🎂">🎂</span>
                        <span class="cat-option" data-cat="🎸">🎸</span>
                        <span class="cat-option" data-cat="🏀">🏀</span>
                    </div>
                    <label>КОГДА</label>
                    <input type="datetime-local" id="eventDate">
                    <button onclick="submitEvent()" class="submit-btn-full">Создать</button>
                </div>
            </div>
            <div class="events-grid" id="eventsGrid"><p>Загрузка...</p></div>
            <button class="add-event-btn" onclick="showCreateForm()"><span class="add-icon">+</span><span>Добавить событие</span></button>
            <div class="modal-overlay" id="eventModal" style="display: none;"><div class="modal-card" id="modalContent"></div></div>
        </div>

        <!-- ЭКРАН ПРОФИЛЯ -->
        <div id="profileScreen">
            <button class="back-btn" onclick="showScreen('mainMenu')">← Назад</button>
            <h1 style="font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 30px;">Профиль</h1>
            <div style="text-align: center; margin-bottom: 30px;">
                <div id="profileAvatar" style="width: 80px; height: 80px; border-radius: 50%; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto;">👤</div>
            </div>
            <label style="color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Имя</label>
            <input type="text" id="profileNameInput" style="width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 20px;">
            <button onclick="updateProfile()" style="width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 700; font-size: 16px;">Сохранить</button>
            <div id="profileStats" style="margin-top: 30px;"></div>
        </div>
    </div>

    <script>
        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        var USER_ID = 'user1';
        var userName = 'Гость';
        var selectedCategory = '🍖';
        var eventsList = [];
        var USER_NAMES = {};
        var avatarColors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#6c5ce7', '#ff9ff3', '#54a0ff', '#5f27cd'];

        // --- ЭКРАНЫ ---
        function showScreen(screenId) {
            document.querySelectorAll('#loginScreen, #mainMenu, #eventsScreen, #profileScreen').forEach(el => el.style.display = 'none');
            document.getElementById(screenId).style.display = 'block';
            if (screenId === 'eventsScreen') {
                loadEvents();
            } else if (screenId === 'profileScreen') {
                loadProfile();
            }
            // Показываем кнопку "Назад" на вложенных экранах
            document.querySelectorAll('.back-btn').forEach(b => b.style.display = (screenId === 'eventsScreen' || screenId === 'profileScreen') ? 'inline-block' : 'none');
        }

        // --- ЭКРАН ВХОДА ---
        function saveName() {
            var name = document.getElementById('nameInput').value.trim();
            if (!name) return alert('Введи имя!');
            localStorage.setItem('userName', name);
            localStorage.setItem('userId', 'u_' + Date.now());
            initUser();
            showScreen('mainMenu');
        }

        // --- ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЯ ---
        function initUser() {
            var savedName = localStorage.getItem('userName');
            if (savedName) {
                userName = savedName;
                USER_ID = localStorage.getItem('userId') || 'user1';
            } else {
                return showScreen('loginScreen');
            }
            USER_NAMES[USER_ID] = userName;
            document.getElementById('profileNameInput').value = userName;
        }

        // --- ОБНОВЛЕНИЕ ПРОФИЛЯ ---
        function updateProfile() {
            var newName = document.getElementById('profileNameInput').value.trim();
            if (!newName) return alert('Имя не может быть пустым!');
            localStorage.setItem('userName', newName);
            userName = newName;
            USER_NAMES[USER_ID] = newName;
            alert('Имя обновлено!');
            loadProfile();
        }

        // --- ЗАГРУЗКА ПРОФИЛЯ ---
        async function loadProfile() {
            document.getElementById('profileNameInput').value = userName;
            try {
                var res = await fetch('/api/profile/' + USER_ID);
                var data = await res.json();
                var statsHtml = '<div class="stats-grid">' +
                    '<div class="stat-card"><div class="stat-value">' + data.stats.created + '</div><div class="stat-label">Создано</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + data.stats.attended + '</div><div class="stat-label">Посещено</div></div>' +
                    '</div>';
                if (data.achievements && data.achievements.length) {
                    statsHtml += '<p style="font-weight:600;">🏆 Ачивки</p><div class="achievements-list">' +
                        data.achievements.map(a => '<span class="achievement-badge"><span class="achievement-emoji">' + a.emoji + '</span> ' + a.name + '</span>').join('') + '</div>';
                }
                document.getElementById('profileStats').innerHTML = statsHtml;
            } catch (e) {}
        }

        // --- СТАРЫЙ КОД (создание, отображение событий, модалки) без изменений ---
        function showCreateForm() { document.getElementById('createForm').style.display = 'flex'; }
        function hideCreateForm() { document.getElementById('createForm').style.display = 'none'; }

        async function submitEvent() {
            var name = document.getElementById('eventName').value.trim();
            var desc = document.getElementById('eventDesc').value.trim();
            var date = document.getElementById('eventDate').value;
            if (!name || !date) { alert('Заполни название и дату!'); return; }
            var body = JSON.stringify({ name: name, description: desc, date: date, category: selectedCategory, creator_id: USER_ID });
            try {
                var res = await fetch('/api/events', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body });
                if (res.ok) {
                    hideCreateForm();
                    document.getElementById('eventName').value = '';
                    document.getElementById('eventDesc').value = '';
                    document.getElementById('eventDate').value = '';
                    loadEvents();
                } else { var err = await res.json(); alert('❌ Ошибка: ' + (err.error || 'неизвестно')); }
            } catch(e) { alert('❌ Ошибка соединения'); }
        }

        async function loadEvents() {
            var grid = document.getElementById('eventsGrid');
            try {
                var res = await fetch('/api/events');
                eventsList = await res.json();
                if (!eventsList.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-emoji">🦗</div><p>Пока тихо...</p><p style="font-size:13px;color:#666;">Жми на <b>+</b> и создавай движуху!</p></div>'; return; }
                eventsList.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
                grid.innerHTML = eventsList.map(function(event, index) { return createEventCard(event, index); }).join('');
            } catch(e) { grid.innerHTML = '<p style="color:red;text-align:center;">Ошибка загрузки</p>'; }
        }

        function createEventCard(event, index) {
            var isGoing = event.participants && event.participants.indexOf(USER_ID) >= 0;
            var count = event.participants ? event.participants.length : 0;
            var avatarsHtml = '';
            if (event.participants && event.participants.length > 0) {
                event.participants.slice(0, 4).forEach(function(userId, i) {
                    var name = USER_NAMES[userId] || userId;
                    var initial = (name[0] || '?').toUpperCase();
                    avatarsHtml += '<span class="avatar">' + initial + '</span>';
                });
            }
            var moreHtml = count > 4 ? '<span class="more-avatars">+' + (count - 4) + '</span>' : '';
            var participantsHtml = count === 0 ? '<span style="font-size:12px;color:#888;margin-left:4px;">Будь первым!</span>' : '';
            return '<div class="event-card"><div class="card-emoji">' + (event.category || '🎉') + '</div><div class="card-info" onclick="openEventModal(\'' + event.id + '\')"><h3>' + escapeHtml(event.name) + '</h3><div class="card-date"><span class="date-day">' + formatDateDay(event.date) + '</span><span class="date-time">' + formatDateTime(event.date) + '</span></div><div class="participants-row"><div class="avatars-stack">' + avatarsHtml + moreHtml + '</div>' + participantsHtml + '<span class="count-badge">' + count + '</span></div></div></div>';
        }

        async function toggleRSVP(eventId, currentlyGoing) {
            var endpoint = currentlyGoing ? '/api/leave' : '/api/join';
            try {
                var res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event_id: eventId, user_id: USER_ID }) });
                if (res.ok) {
                    var event = eventsList.find(function(e) { return e.id === eventId; });
                    if (event) {
                        if (!event.participants) event.participants = [];
                        if (currentlyGoing) { event.participants = event.participants.filter(function(id) { return id !== USER_ID; }); }
                        else if (event.participants.indexOf(USER_ID) === -1) { event.participants.push(USER_ID); }
                        loadEvents();
                    }
                }
            } catch(e) {}
        }

        function openEventModal(eventId) {
            var event = eventsList.find(function(e) { return e.id === eventId; });
            if (!event) return;
            var isGoing = event.participants && event.participants.indexOf(USER_ID) >= 0;
            var count = event.participants ? event.participants.length : 0;
            var participantsList = '';
            if (event.participants && event.participants.length > 0) {
                participantsList = event.participants.map(function(userId, i) {
                    var name = USER_NAMES[userId] || userId;
                    var initial = (name[0] || '?').toUpperCase();
                    var isMe = (userId === USER_ID);
                    var isCreator = (userId === event.creator_id);
                    return '<span class="participant-badge' + (isMe ? ' is-me' : '') + '">' +
                        '<span class="avatar" style="width:28px;height:28px;font-size:12px;margin-left:0;">' + initial + '</span>' +
                        '<span class="participant-name">' + name + (isMe ? ' (ты)' : '') + '</span>' +
                        (isCreator ? ' <span class="crown">👑</span>' : '') +
                    '</span>';
                }).join('');
            } else {
                participantsList = '<p class="no-participants">Пока никто не записался</p>';
            }
            document.getElementById('modalContent').innerHTML = 
                '<button class="modal-close-btn" onclick="document.getElementById(\'eventModal\').style.display=\'none\'">✕</button>' +
                '<div class="modal-header">' +
                    '<div class="modal-emoji">' + (event.category || '🎉') + '</div>' +
                    '<div class="modal-title-block">' +
                        '<h2>' + escapeHtml(event.name) + '</h2>' +
                        '<div class="modal-creator">👤 ' + escapeHtml(event.creator_name || 'Некто') + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="modal-date-section">' +
                    '<div class="modal-date-icon">📅</div>' +
                    '<div class="modal-date-text">' + formatDateFull(event.date) + '</div>' +
                '</div>' +
                (event.description ? '<p class="modal-description">' + escapeHtml(event.description) + '</p>' : '') +
                '<div class="modal-participants-section">' +
                    '<div class="modal-section-label">👥 Участники (' + count + ')</div>' +
                    '<div class="participants-list">' + participantsList + '</div>' +
                '</div>' +
                '<div class="modal-actions">' +
                    '<button class="rsvp-btn ' + (isGoing ? 'going' : 'not-going') + '" onclick="toggleRSVP(\'' + event.id + '\', ' + isGoing + '); document.getElementById(\'eventModal\').style.display=\'none\';">' +
                        (isGoing ? '✕ ОТМЕНИТЬ УЧАСТИЕ' : '➕ БУДУ') +
                    '</button>' +
                '</div>';
            document.getElementById('eventModal').style.display = 'flex';
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function formatDate(d) { if(!d) return ''; var date=new Date(d), now=new Date(), t=date.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); if(date.toDateString()===now.toDateString()) return 'Сегодня · '+t; var tom=new Date(now); tom.setDate(tom.getDate()+1); if(date.toDateString()===tom.toDateString()) return 'Завтра · '+t; return date.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'})+' · '+t; }
        function formatDateFull(d) { if(!d) return ''; var date=new Date(d); return date.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}); }
        function formatDateDay(d) { if(!d) return ''; var date=new Date(d); var now=new Date(); if(date.toDateString()===now.toDateString()) return 'Сегодня'; var tom=new Date(now); tom.setDate(tom.getDate()+1); if(date.toDateString()===tom.toDateString()) return 'Завтра'; return date.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'}); }
        function formatDateTime(d) { if(!d) return ''; var date=new Date(d); return date.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
        function escapeHtml(t) { var div=document.createElement('div'); div.textContent=t||''; return div.innerHTML; }

        // --- ЗАПУСК ---
        initUser();
        if (!localStorage.getItem('userName')) {
            showScreen('loginScreen');
        } else {
            showScreen('mainMenu');
        }

        document.getElementById('eventModal').onclick = function(e) { if(e.target===this) this.style.display='none'; };
        document.querySelectorAll('.cat-option').forEach(el => el.onclick = function() {
            document.querySelectorAll('.cat-option').forEach(o => o.classList.remove('active'));
            this.classList.add('active');
            selectedCategory = this.getAttribute('data-cat');
        });
    </script>
</body>
</html>
