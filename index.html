<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 Тусовки</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="pulse-bar">
        <span class="pulse-icon">⚡</span>
        <span class="pulse-text" id="pulseText">Загружаем...</span>
    </div>

    <div class="container">
        <header>
            <h1>🔥 Тусовки</h1>
            <button class="create-btn" onclick="showCreateForm()">
                <span>+</span>
            </button>
        </header>

        <!-- ТЕСТОВА КНОПКА -->
        <button onclick="testForm()" style="width: 100%; padding: 12px; background: red; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; margin-bottom: 12px;">
            🧪 ТЕСТ: Показать форму
        </button>

        <!-- ФОРМА СОЗДАНИЯ -->
        <div class="create-form" id="createForm" style="display: none;">
            <div class="form-card" onclick="event.stopPropagation();">
                <h2>Новая движуха</h2>
                <input type="text" id="eventName" placeholder="Название..." maxlength="40" autocomplete="off">
                <input type="text" id="eventDesc" placeholder="Описание" maxlength="120" autocomplete="off">
                
                <label>Тип встречи:</label>
                <div class="category-picker">
                    <span class="cat-option" data-cat="🍖">🍖</span>
                    <span class="cat-option" data-cat="🎬">🎬</span>
                    <span class="cat-option" data-cat="🌊">🌊</span>
                    <span class="cat-option" data-cat="🍻">🍻</span>
                    <span class="cat-option" data-cat="🎲">🎲</span>
                    <span class="cat-option" data-cat="🎂">🎂</span>
                    <span class="cat-option" data-cat="🎸">🎸</span>
                    <span class="cat-option" data-cat="🏀">🏀</span>
                </div>

                <label>Когда:</label>
                <input type="datetime-local" id="eventDate">
                
                <div class="form-actions">
                    <button onclick="hideCreateForm()" class="cancel-btn">❌ Отмена</button>
                    <button onclick="createEvent()" class="submit-btn">✅ Создать</button>
                </div>
            </div>
        </div>

        <!-- СЕТКА СОБЫТИЙ -->
        <div class="events-grid" id="eventsGrid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Грузим тусовки...</p>
            </div>
        </div>

        <!-- МОДАЛКА СОБЫТИЯ -->
        <div class="modal-overlay" id="eventModal" style="display: none;">
            <div class="modal-card" id="modalContent" onclick="event.stopPropagation();"></div>
        </div>

        <!-- МОДАЛКА ПРОФИЛЯ -->
        <div class="modal-overlay" id="profileModal" style="display: none;">
            <div class="modal-card" id="profileContent" onclick="event.stopPropagation();"></div>
        </div>
    </div>

    <button class="profile-fab" onclick="showMyProfile()">👤</button>

    <script>
        // Тестова функція — гарантовано покаже форму
        function testForm() {
            var form = document.getElementById('createForm');
            if (form) {
                form.style.display = 'flex';
                alert('✅ Форма знайдена і показана!');
            } else {
                alert('❌ Елемент createForm не знайдено!');
            }
        }
        
        function showCreateForm() {
            var form = document.getElementById('createForm');
            if (form) {
                form.style.display = 'flex';
            } else {
                alert('❌ showCreateForm: createForm не знайдено!');
            }
        }
        
        function hideCreateForm() {
            var form = document.getElementById('createForm');
            if (form) form.style.display = 'none';
        }
        
        function closeEventModal() {
            var modal = document.getElementById('eventModal');
            if (modal) modal.style.display = 'none';
        }
        
        function closeProfileModal() {
            var modal = document.getElementById('profileModal');
            if (modal) modal.style.display = 'none';
        }
        
        async function createEvent() {
            var name = document.getElementById('eventName')?.value?.trim();
            var date = document.getElementById('eventDate')?.value;
            
            if (!name || !date) {
                alert('Заполни название и дату!');
                return;
            }
            
            try {
                var res = await fetch('/api/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        description: document.getElementById('eventDesc')?.value?.trim() || '',
                        date: date,
                        category: '🍖',
                        creator_id: 'user1'
                    })
                });
                
                if (res.ok) {
                    alert('✅ Событие создано!');
                    hideCreateForm();
                    document.getElementById('eventName').value = '';
                    document.getElementById('eventDesc').value = '';
                    document.getElementById('eventDate').value = '';
                    location.reload();
                } else {
                    alert('❌ Ошибка создания');
                }
            } catch (e) {
                alert('❌ Ошибка: ' + e.message);
            }
        }
    </script>
    
    <script src="/static/app.js"></script>
</body>
</html>
