<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Караван</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* === БАЗА === */
        .pulse-bar { display: none !important; }
        .container { padding: 0 12px !important; max-width: 500px; margin: 0 auto; position: relative; min-height: 100vh; }

        /* === ЭКРАНЫ === */
        #onboardingScreen, #loginScreen, #mainMenu, #eventsScreen, #profileScreen, #statsScreen { display: none; }

        /* --- Онбординг --- */
        #onboardingScreen { flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
        #onboardingScreen h1 { font-size: 42px; font-weight: 900; letter-spacing: 2px; margin-bottom: 20px; }
        #onboardingScreen p { color: #aaa; font-size: 16px; margin-bottom: 40px; line-height: 1.5; }
        #onboardingScreen button { width: 100%; max-width: 300px; padding: 16px; background: #fff; color: #000; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; }

        /* --- Вход --- */
        #loginScreen {
            flex-direction: column; align-items: center; justify-content: center;
            min-height: 80vh; padding: 16px; position: relative; overflow: hidden;
        }
        #loginScreen h1 { font-size: 28px; font-weight: 800; letter-spacing: 0.5px; text-align: center; margin-bottom: 40px; line-height: 1.3; }
        #loginScreen input {
            width: 100%; max-width: 360px; padding: 18px 20px;
            background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px; color: #fff; font-size: 18px; text-align: center;
            margin-bottom: 24px; outline: none;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.03), inset 0 0 16px rgba(0, 0, 0, 0.6);
            position: relative; z-index: 2;
        }
        #loginScreen input::placeholder { color: #666; font-size: 16px; }
        #loginScreen button {
            width: 100%; max-width: 360px; padding: 18px; background: #fff; color: #000;
            border: none; border-radius: 16px; font-size: 18px; font-weight: 700;
            cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            position: relative; z-index: 2;
        }
        #loginScreen button:active { background: #ccc; transform: scale(0.98); }

        /* Падающие эмодзи */
        .falling-emoji {
            position: fixed; top: -60px; font-size: 28px; opacity: 0.25;
            pointer-events: none; z-index: 1; user-select: none; transition: none;
        }

        /* --- Меню --- */
        #mainMenu { flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 20px; position: relative; overflow: hidden; }
        #mainMenu button { width: 100%; max-width: 320px; padding: 20px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; color: #fff; font-size: 20px; font-weight: 600; cursor: pointer; box-shadow: 0 0 30px rgba(255,255,255,0.03); position: relative; z-index: 1; }
        #mainMenu canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* --- Стрелка назад --- */
        .back-arrow {
            position: absolute; top: 20px; left: 12px; background: none; border: none;
            color: #888; font-size: 28px; cursor: pointer; z-index: 10; padding: 0; line-height: 1;
        }

        /* --- Заголовок событий --- */
        #eventsHeader {
            margin-left: 40px; margin-right: 0; font-size: 36px; font-weight: 900; letter-spacing: 2px;
            padding: 16px 0 12px 0; border-bottom: 2px solid #333; border-radius: 0 0 20px 20px;
            background: #000; text-align: center;
            box-shadow: 0 4px 12px rgba(255,255,255,0.06), inset 0 -2px 8px rgba(255,255,255,0.08);
            position: relative;
        }
        #eventsHeader::after {
            content: ""; position: absolute; left: 0; bottom: -2px; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.15) 80%, transparent 100%);
            border-radius: 0 0 20px 20px; box-shadow: 0 0 6px rgba(255,255,255,0.1); z-index: 5;
        }

        /* --- Кнопка статистики --- */
        .stats-fab {
            position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px;
            border-radius: 16px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 0 20px rgba(255,255,255,0.06); display: flex; align-items: center;
            justify-content: center; font-size: 24px; cursor: pointer; z-index: 50; transition: all 0.2s;
        }
        .stats-fab:active { background: #fff; color: #000; border-color: #fff; }

        /* --- Карточки событий --- */
        .event-card { display: flex; align-items: center; gap: 14px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; box-shadow: 0 0 30px rgba(255,255,255,0.03), inset 0 0 20px rgba(0,0,0,0.4); transition: border-color 0.2s, box-shadow 0.2s; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
        .event-card:active { border-color: rgba(255,255,255,0.25); box-shadow: 0 0 40px rgba(255,255,255,0.05); }
        .card-emoji { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.18); border-radius: 14px; font-size: 32px; flex-shrink: 0; }
        .card-info { flex: 1; min-width: 0; }
        .card-info h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; margin: 0 0 4px; color: #fff; }
        .card-date { font-size: 13px; color: #999; margin-bottom: 6px; display: flex; flex-direction: column; line-height: 1.4; }
        .card-date .date-day { font-weight: 600; color: #ccc; }
        .card-date .date-time { font-weight: 400; color: #888; }
        .participants-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .avatars-stack { display: flex; align-items: center; }
        .avatar { width: 26px; height: 26px; border-radius: 50%; background: #2a2a2a; color: #aaa; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 1px solid #3a3a3a; margin-left: -8px; }
        .avatar:first-child { margin-left: 0; }
        .more-avatars { font-size: 12px; color: #888; margin-left: 4px; font-weight: 500; }
        .count-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 2px 8px; font-size: 12px; font-weight: 600; color: #ccc; margin-left: auto; }

        /* --- Кнопка добавить событие --- */
        .add-event-btn { width: 100% !important; box-sizing: border-box !important; padding: 16px; margin-top: 12px; margin-left: 0 !important; margin-right: 0 !important; background: rgba(255,255,255,0.03); border: 1px dashed #333; border-radius: 14px; color: #666; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; letter-spacing: 0.5px; }
        .add-event-btn:active { background: rgba(255,255,255,0.06); border-color: #555; color: #999; }
        .add-icon { font-size: 20px; font-weight: 300; line-height: 1; }

        /* --- Форма создания --- */
        .create-form { padding: 12px !important; box-sizing: border-box !important; }
        .form-card { background: #0a0a0a !important; border: 1px solid rgba(255,255,255,0.3) !important; box-shadow: 0 0 24px rgba(255,255,255,0.12), 0 0 48px rgba(255,255,255,0.04), inset 0 0 24px rgba(0,0,0,0.8) !important; border-radius: 24px !important; width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; margin: 0 !important; padding: 20px 16px !important; overflow: visible !important; position: relative !important; }
        .form-card input, .form-card input[type="text"], .form-card input[type="datetime-local"] { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; padding: 12px !important; margin-bottom: 10px !important; -webkit-appearance: none !important; appearance: none !important; min-width: 0 !important; }
        .form-card label { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .category-picker { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .cat-option { font-size: 32px !important; padding: 14px !important; width: calc(25% - 10px) !important; box-sizing: border-box; display: flex; align-items: center; justify-content: center; filter: grayscale(0%) !important; opacity: 0.5 !important; border: 1px solid #2a2a2a !important; border-radius: 12px !important; cursor: pointer; transition: all 0.2s; }
        .cat-option.active { opacity: 1 !important; border-color: #555 !important; background: rgba(255,255,255,0.05); }
        .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; position: relative; }
        .header-title-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; margin-right: 8px; }
        .header-title-wrapper h2 { margin: 0; font-size: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; line-height: 1; text-align: center; white-space: nowrap; }
        .submit-btn-full { width: 100%; padding: 14px; margin-top: 20px; background: #fff; color: #000; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        .submit-btn-full:active { background: #ccc; }

        /* --- Геолокация --- */
        .location-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .location-btn { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px 16px; color: #ccc; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .location-btn:active { background: #fff; color: #000; border-color: #fff; }
        .location-preview { flex: 1; color: #888; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .static-map-preview { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .open-in-maps { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px; color: #fff; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .open-in-maps:active { background: #fff; color: #000; }

        /* --- Профиль (ЭЛИТНЫЙ UI) --- */
        #profileScreen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        .profile-container {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
        }
        .profile-avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .profile-avatar-bg {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 30px rgba(255,255,255,0.08);
            transition: transform 0.2s;
        }
        .profile-avatar-bg:active { transform: scale(0.95); }
        .profile-name-display {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 24px;
            color: #fff;
        }
        .profile-stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .profile-stat-item {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
        }
        .profile-stat-item .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }
        .profile-stat-item .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-top: 4px;
        }
        .profile-achievements {
            margin: 20px 0;
        }
        .profile-achievements .section-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 12px;
        }
        .achievement-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        .achievement-card .ach-emoji {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }
        .achievement-card .ach-name {
            font-weight: 600;
            color: #ddd;
        }
        .profile-edit-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .profile-edit-btn:active { background: #ccc; }
        .profile-logout-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #333;
            border-radius: 14px;
            color: #ff6b6b;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .profile-logout-btn:active { background: #1a1a1a; }

        /* --- Статистика --- */
        #statsScreen { padding-top: 20px; }
        #statsScreen h1 { font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 30px; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .leaderboard-table th { color: #aaa; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .leaderboard-table td { color: #ccc; font-size: 15px; }
        .leaderboard-table .pos { font-weight: 700; }

        /* --- Toast --- */
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 999; box-shadow: 0 8px 30px rgba(0,0,0,0.5); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

        /* Карта */
        #mapContainer { width: 100%; height: 60vh; border-radius: 16px; margin-bottom: 16px; }
        .cross-center { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .leaflet-container { background: #0a0a0a; filter: grayscale(100%) invert(92%) hue-rotate(180deg); }
    </style>
</head>
<body>
<div class="container">
    <!-- 1. ОНБОРДИНГ -->
    <div id="onboardingScreen" style="display: none;">
        <h1>🐪 Я Караван!</h1>
        <p>Сделаю вашу компанейскую жизнь удобнее<br>и добавлю нотку азарта к вам в группу</p>
        <button onclick="startRegistration()">Зарегистрироваться</button>
    </div>

    <!-- 2. ЭКРАН ВХОДА -->
    <div id="loginScreen" style="display: none;">
        <h1>Как чаще всего зовут тебя твои друзья?</h1>
        <input type="text" id="nameInput" placeholder="" maxlength="30" autocomplete="off" autofocus>
        <button onclick="saveName()">Войти</button>
    </div>

    <!-- 3. ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu" style="display: none;">
        <canvas id="fireworksCanvas"></canvas>
        <button onclick="showScreen('eventsScreen')">📅 События</button>
        <button onclick="showScreen('profileScreen')">👤 Профиль</button>
    </div>

    <!-- 4. ЭКРАН СОБЫТИЙ -->
    <div id="eventsScreen" style="display: none;">
        <button class="back-arrow" onclick="showScreen('mainMenu')">←</button>
        <div id="eventsHeader">События 💭</div>
        <div class="create-form" id="createForm" style="display: none;">
            <div class="form-card">
                <div class="form-header">
                    <div class="header-title-wrapper"><h2>Новое событие</h2></div>
                    <div onclick="hideCreateForm()" style="width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.3); color: #aaa; font-size: 20px; font-weight: 300; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 8px rgba(255,255,255,0.05);" onmousedown="this.style.background='#fff'; this.style.color='#000';" onmouseup="this.style.background='#1a1a1a'; this.style.color='#aaa';" ontouchstart="this.style.background='#fff'; this.style.color='#000';" ontouchend="this.style.background='#1a1a1a'; this.style.color='#aaa';">✕</div>
                </div>
                <input type="text" id="eventName" placeholder="Название" maxlength="40">
                <input type="text" id="eventDesc" placeholder="Описание" maxlength="120">
                <label>Тип встречи</label>
                <div class="category-picker">
                    <span class="cat-option active" data-cat="🍖">🍖</span>
                    <span class="cat-option" data-cat="🎬">🎬</span>
                    <span class="cat-option" data-cat="🌊">🌊</span>
                    <span class="cat-option" data-cat="🍻">🍻</span>
                    <span class="cat-option" data-cat="🎲">🎲</span>
                    <span class="cat-option" data-cat="🎂">🎂</span>
                    <span class="cat-option" data-cat="🎸">🎸</span>
                    <span class="cat-option" data-cat="🏀">🏀</span>
                </div>
                <label>КОГДА</label>
                <input type="datetime-local" id="eventDate">
                <label style="margin-top: 12px;">МЕСТО ВСТРЕЧИ</label>
                <div class="location-row">
                    <button class="location-btn" onclick="openMapModal()">🗺️ Указать</button>
                    <span class="location-preview" id="locationText">Не выбрано</span>
                </div>
                <button onclick="submitEvent()" class="submit-btn-full">Создать</button>
            </div>
        </div>
        <div class="events-grid" id="eventsGrid"><p>Загрузка...</p></div>
        <button class="add-event-btn" onclick="showCreateForm()"><span class="add-icon">+</span><span>Добавить событие</span></button>
    </div>

    <!-- 5. ЭКРАН ПРОФИЛЯ (ЭЛИТНЫЙ) -->
    <div id="profileScreen" style="display: none;">
        <button class="back-arrow" onclick="showScreen('mainMenu')">←</button>
        <div class="profile-container">
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar-bg" id="profileAvatar" onclick="selectEmoji()">👤</div>
            </div>
            <div class="profile-name-display" id="profileNameDisplay">Гость</div>
            <div class="profile-stats-row">
                <div class="profile-stat-item">
                    <div class="stat-number" id="profileCreated">0</div>
                    <div class="stat-label">Создано</div>
                </div>
                <div class="profile-stat-item">
                    <div class="stat-number" id="profileAttended">0</div>
                    <div class="stat-label">Посещено</div>
                </div>
            </div>
            <div class="profile-achievements" id="profileAchievements">
                <div class="section-title">🏆 Ачивки</div>
                <div id="achievementsList"></div>
            </div>
            <button class="profile-edit-btn" onclick="editProfile()">Редактировать</button>
            <button class="profile-logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <!-- 6. ЭКРАН СТАТИСТИКИ -->
    <div id="statsScreen" style="display: none;">
        <button class="back-arrow" onclick="showScreen('eventsScreen')">←</button>
        <h1>📊 Статистика</h1>
        <div id="statsContent"></div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal-overlay" id="eventModal"><div class="modal-card" id="modalContent"></div></div>
    <div class="modal-overlay" id="emojiPicker" onclick="this.style.display='none'"><div class="modal-card" id="emojiList"></div></div>
    <div class="modal-overlay" id="mapModal">
        <div class="modal-card" style="max-width: 95%; padding: 16px;">
            <button class="modal-close-btn" onclick="closeMapModal()">✕</button>
            <h2 style="margin-top:0; margin-bottom:12px;">Выбери место</h2>
            <div id="mapContainer"></div>
            <button class="submit-btn-full" onclick="selectLocation()">Выбрать</button>
        </div>
    </div>
</div>

<button class="stats-fab" id="statsFab" onclick="showScreen('statsScreen')" style="display: none;">📊</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- ГЛОБАЛЬНЫЕ ---
    let USER_ID = 'user1';
    let userName = 'Гость';
    let userEmoji = '👤';
    let selectedCategory = '🍖';
    let eventsList = [];
    let USER_NAMES = {};
    let fireworksActive = false;
    let fallingEmojis = [];
    let loginEmojiInterval = null;
    let selectedLat = null, selectedLng = null;
    let map = null, marker = null;

    // --- НАВИГАЦИЯ ---
    function showScreen(id) {
        ['onboardingScreen', 'loginScreen', 'mainMenu', 'eventsScreen', 'profileScreen', 'statsScreen'].forEach(s => {
            document.getElementById(s).style.display = 'none';
        });
        let target = document.getElementById(id);
        if (!target) return;
        let isFlex = (id === 'mainMenu' || id === 'onboardingScreen' || id === 'loginScreen' || id === 'profileScreen');
        target.style.display = isFlex ? 'flex' : 'block';

        if (id === 'mainMenu') startFireworks(); else stopFireworks();
        if (id === 'loginScreen') { startFallingEmojis(); setRandomPlaceholder(); } else stopFallingEmojis();
        document.getElementById('statsFab').style.display = (id === 'eventsScreen') ? 'flex' : 'none';
        if (id === 'eventsScreen') loadEvents();
        if (id === 'profileScreen') loadProfileScreen();
        if (id === 'statsScreen') loadStatistics();
    }

    // --- ПРОФИЛЬ (Загрузка данных) ---
    async function loadProfileScreen() {
        document.getElementById('profileNameDisplay').textContent = userName;
        document.getElementById('profileAvatar').textContent = userEmoji;
        try {
            const res = await fetch('/api/profile/' + USER_ID);
            const data = await res.json();
            document.getElementById('profileCreated').textContent = data.stats.created;
            document.getElementById('profileAttended').textContent = data.stats.attended;
            let achievementsHtml = '';
            if (data.achievements && data.achievements.length) {
                data.achievements.forEach(a => {
                    achievementsHtml += `<div class="achievement-card"><span class="ach-emoji">${a.emoji}</span><span class="ach-name">${a.name}</span></div>`;
                });
            } else {
                achievementsHtml = '<p style="color:#666;">Пока нет ачивок. Участвуй в движухах!</p>';
            }
            document.getElementById('achievementsList').innerHTML = achievementsHtml;
        } catch(e) {}
    }

    function editProfile() {
        let newName = prompt('Новое имя', userName);
        if (newName && newName.trim()) {
            userName = newName.trim();
            localStorage.setItem('userName', userName);
            USER_NAMES[USER_ID] = userName;
            loadProfileScreen();
            showToast('✅ Имя обновлено');
        }
    }

    // ... (остальные функции: вход, эмодзи, салюты, события, карта, статистика – без изменений, они уже были в предыдущих ответах)
