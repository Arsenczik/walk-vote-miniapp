<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Голосовалки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }

    .header { padding: 48px 24px 20px; position: sticky; top: 0; background: #0a0a0a; z-index: 10; }
    .header-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .header-label { font-size: 11px; font-weight: 700; color: #6366f1; letter-spacing: 2px; margin-bottom: 4px; font-family: 'Unbounded', sans-serif; }
    .header-title { font-size: 28px; font-weight: 900; color: #f0f0f0; font-family: 'Unbounded', sans-serif; }
    .header-icon { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 18px; }

    .stats { display: flex; gap: 10px; margin-top: 20px; }
    .stat { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 10px 12px; }
    .stat-value { font-size: 20px; font-weight: 800; font-family: 'Unbounded', sans-serif; }
    .stat-label { font-size: 10px; color: #555; margin-top: 2px; }

    .polls { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 12px; }

    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 18px 20px; cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s; }
    .card:active { background: rgba(255,255,255,0.07); }
    .card-date { font-size: 13px; color: #666; margin-bottom: 6px; }
    .card-title { font-size: 17px; font-weight: 700; color: #f0f0f0; margin-bottom: 14px; font-family: 'Unbounded', sans-serif; line-height: 1.3; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .daily-badge { position: absolute; top: 0; right: 0; background: linear-gradient(135deg, #6366f1, #8b5cf6); font-size: 10px; font-weight: 700; color: #fff; padding: 4px 12px; border-bottom-left-radius: 12px; letter-spacing: 1px; font-family: 'Unbounded', sans-serif; }

    .vote-counts { display: flex; gap: 8px; }
    .vote-count { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; }

    .fab { position: fixed; bottom: 32px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; cursor: pointer; font-size: 28px; color: #fff; box-shadow: 0 8px 32px rgba(99,102,241,0.4); z-index: 50; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
    .fab:active { transform: scale(0.95); }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; }
    .sheet { background: #111; border-radius: 28px 28px 0 0; padding: 28px 24px 40px; border: 1px solid rgba(255,255,255,0.08); animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 0 auto 24px; }
    .sheet-title { font-size: 22px; font-weight: 800; font-family: 'Unbounded', sans-serif; margin-bottom: 6px; }
    .sheet-date { font-size: 13px; color: #555; margin-bottom: 28px; }

    .vote-buttons { display: flex; gap: 10px; margin-bottom: 28px; }
    .vote-btn { flex: 1; padding: 14px 8px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.2s; }
    .vote-btn.active-yes { border-color: #4ade80; background: rgba(74,222,128,0.15); }
    .vote-btn.active-maybe { border-color: #facc15; background: rgba(250,204,21,0.15); }
    .vote-btn.active-no { border-color: #f87171; background: rgba(248,113,113,0.15); }
    .vote-btn-emoji { font-size: 22px; }
    .vote-btn-label { font-size: 12px; font-weight: 700; font-family: 'Unbounded', sans-serif; color: #666; }
    .vote-btn-label.yes { color: #4ade80; }
    .vote-btn-label.maybe { color: #facc15; }
    .vote-btn-label.no { color: #f87171; }
    .vote-btn-count { font-size: 16px; font-weight: 800; font-family: 'Unbounded', sans-serif; color: #444; }
    .vote-btn-count.yes { color: #4ade80; }
    .vote-btn-count.maybe { color: #facc15; }
    .vote-btn-count.no { color: #f87171; }

    .who-section { margin-bottom: 16px; }
    .who-label { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 1px; margin-bottom: 10px; font-family: 'Unbounded', sans-serif; }
    .who-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .who-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.04); padding: 6px 12px 6px 6px; border-radius: 20px; }
    .who-chip-name { font-size: 13px; color: #ccc; }

    .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-family: 'Unbounded', sans-serif; border: 2px solid rgba(255,255,255,0.1); flex-shrink: 0; }

    .new-presets { display: flex; gap: 10px; margin-bottom: 16px; }
    .preset-btn { flex: 1; padding: 12px 8px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); cursor: pointer; color: #666; font-size: 12px; font-weight: 700; font-family: 'Unbounded', sans-serif; transition: all 0.2s; line-height: 1.4; }
    .preset-btn.active { border-color: #6366f1; background: rgba(99,102,241,0.15); color: #818cf8; }
    .new-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #f0f0f0; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 16px; }
    .new-input::placeholder { color: #444; }
    .create-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 15px; font-weight: 700; font-family: 'Unbounded', sans-serif; cursor: pointer; transition: all 0.2s; }
    .create-btn.ready { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .create-btn.disabled { background: rgba(255,255,255,0.05); color: #444; cursor: default; }

    .loading { display: flex; align-items: center; justify-content: center; height: 200px; font-size: 14px; color: #555; font-family: 'Unbounded', sans-serif; }

    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-label" id="headerDate">ЗАГРУЗКА...</div>
      <div class="header-title">Голосовалки</div>
    </div>
    <div class="header-icon">🚶</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" style="color:#4ade80" id="statGoing">—</div>
      <div class="stat-label">Идут сегодня</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:#6366f1" id="statPolls">—</div>
      <div class="stat-label">Голосований</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:#facc15" id="statMembers">—</div>
      <div class="stat-label">Участников</div>
    </div>
  </div>
</div>

<div class="polls" id="pollsList">
  <div class="loading">Загрузка...</div>
</div>

<button class="fab" onclick="openNew()">+</button>

<!-- Poll Modal -->
<div class="overlay" id="pollModal" style="display:none" onclick="handleOverlayClick(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="modalDaily" style="display:none; margin-bottom:12px;">
      <span style="background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;font-family:'Unbounded',sans-serif;letter-spacing:1px;">DAILY</span>
    </div>
    <div class="sheet-title" id="modalTitle"></div>
    <div class="sheet-date" id="modalDate"></div>
    <div class="vote-buttons">
      <button class="vote-btn" id="btnYes" onclick="vote('yes')">
        <span class="vote-btn-emoji">👍</span>
        <span class="vote-btn-label" id="labelYes">Да</span>
        <span class="vote-btn-count" id="countYes">0</span>
      </button>
      <button class="vote-btn" id="btnMaybe" onclick="vote('maybe')">
        <span class="vote-btn-emoji">🤷</span>
        <span class="vote-btn-label" id="labelMaybe">Может</span>
        <span class="vote-btn-count" id="countMaybe">0</span>
      </button>
      <button class="vote-btn" id="btnNo" onclick="vote('no')">
        <span class="vote-btn-emoji">👎</span>
        <span class="vote-btn-label" id="labelNo">Нет</span>
        <span class="vote-btn-count" id="countNo">0</span>
      </button>
    </div>
    <div id="whoList"></div>
  </div>
</div>

<!-- New Poll Modal -->
<div class="overlay" id="newModal" style="display:none" onclick="handleNewOverlayClick(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="margin-bottom:20px;">Новая голосовалка</div>
    <div class="new-presets">
      <button class="preset-btn" id="presetCenter" onclick="selectPreset('Кто будет в центре?', 'presetCenter')">📍 Центр</button>
      <button class="preset-btn" id="presetBestik" onclick="selectPreset('Кто будет на бестике?', 'presetBestik')">
