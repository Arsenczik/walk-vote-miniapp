<!DOCTYPE html>
<html>
<head>
  <title>Event Manager</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>События</h2>
<div id="events"></div>

<script>
const tg = window.Telegram.WebApp;
const user = tg.initDataUnsafe.user;

async function loadEvents() {
  const res = await fetch("/api/events");
  const events = await res.json();

  const container = document.getElementById("events");
  container.innerHTML = "";

  for (let e of events) {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${e.title}</h3>
      <p>Дата: ${e.date}</p>
      <p>Место: ${e.location}</p>
      <a href="${e.maps_url}" target="_blank">Открыть в картах</a>
      <br><br>
      <button onclick="join(${e.id})">Иду</button>
      <div id="p-${e.id}"></div>
      <hr>
    `;

    container.appendChild(div);
    loadParticipants(e.id);
  }
}

async function join(event_id) {
  await fetch("/api/join", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      event_id,
      username: user.username || user.first_name
    })
  });

  loadParticipants(event_id);
}

async function loadParticipants(event_id) {
  const res = await fetch(`/api/participants/${event_id}`);
  const users = await res.json();

  document.getElementById(`p-${event_id}`).innerText =
    "Идут: " + users.join(", ");
}

loadEvents();
</script>

</body>
</html>
