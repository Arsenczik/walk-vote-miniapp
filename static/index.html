<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta charset="UTF-8">
  <title>Events</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #0f0f10;
  color: #fff;
}
html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
}
h2 {
  text-align: center;
  padding: 12px;
  font-size: 20px;
}

.container {
  padding: 10px;
}

.card {
  background: #1b1c20;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}

.meta {
  font-size: 13px;
  color: #aaa;
  margin: 4px 0;
}

.btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: #2ea6ff;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.98);
}

.link {
  display: inline-block;
  margin-top: 8px;
  color: #2ea6ff;
  font-size: 13px;
  text-decoration: none;
}

.participants {
  margin-top: 8px;
  font-size: 13px;
  color: #ccc;
}
</style>
</head>

<body>

<h2>🔥 События</h2>

<div class="container" id="events"></div>

<script>
tg.enableClosingConfirmation?.();

document.body.style.margin = "0";
document.body.style.padding = "0";
const tg = window.Telegram.WebApp;
tg.expand();
  document.body.style.background = tg.themeParams.bg_color || "#0f0f10";
document.body.style.color = tg.themeParams.text_color || "#fff";

const user = tg.initDataUnsafe.user || { first_name: "Anon" };

async function loadEvents() {
  const res = await fetch("/api/events");
  const events = await res.json();

  const container = document.getElementById("events");
  container.innerHTML = "";

  for (let e of events) {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${e.title}</div>
      <div>📅 ${e.date}</div>
      <div>📍 ${e.location}</div>
      <a class="link" href="${e.maps_url}" target="_blank">Открыть в картах</a>

      <button class="btn" onclick="join(${e.id})">Я иду</button>

      <div class="participants" id="p-${e.id}">Загрузка...</div>
    `;

    container.appendChild(div);
    loadParticipants(e.id);
  }
}

async function join(event_id) {
  await fetch("/api/join", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      event_id,
      username: user.username || user.first_name
    })
  });

  loadParticipants(event_id);
}

async function loadParticipants(event_id) {
  const res = await fetch(`/api/participants/${event_id}`);
  const users = await res.json();

  document.getElementById(`p-${event_id}`).innerText =
    "👥 Идут: " + (users.length ? users.join(", ") : "пока никто");
}

loadEvents();
</script>

</body>
</html>
