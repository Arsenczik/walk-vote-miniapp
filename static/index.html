<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk Vote App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .user-card { display: none; margin-bottom: 20px; text-align: center; }
        .btn {
            padding: 15px 25px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="user-info" class="user-card">
        <h2 id="greeting">Привет!</h2>
    </div>

    <h3>За что голосуем?</h3>
    <button class="btn" onclick="sendVote('Вариант А')">Голосовать за А</button>
    <button class="btn" onclick="sendVote('Вариант Б')">Голосовать за Б</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачивает приложение на весь экран

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('greeting').innerText = `Привет, ${user.first_name}! 👋`;
        }

        function sendVote(option) {
            // Отправляем данные обратно в бота или просто закрываем
            tg.showConfirm(`Вы выбрали: ${option}. Подтвердить?`, (ok) => {
                if (ok) {
                    // Здесь мы можем отправить данные на твой сервер в будущем
                    tg.sendData(option); // Отправляет строку боту и закрывает Mini App
                }
            });
        }
    </script>
</body>
</html>
