<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .badge { background: #ffd700; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .btn { background: #0088cc; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div id="user-info" class="card">
        <h3>Привет, <span id="username">Бро</span>!</h3>
        <p>Твой рейтинг: <b id="points">0</b> 🔥</p>
        <div id="achievements"></div>
    </div>

    <div id="events-list">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        document.getElementById('username').innerText = tg.initDataUnsafe.user?.first_name || "Аноним";

        // Функция загрузки ивентов (заглушка)
        async function loadEvents() {
            const list = document.getElementById('events-list');
            // Здесь будет fetch('/api/events')
            list.innerHTML = `
                <div class="card">
                    <h4>🍖 Шашлыки на Висле</h4>
                    <p>15 мая | 18:00</p>
                    <button class="btn" onclick="alert('Ты в деле!')">Я иду!</button>
                </div>
            `;
        }
        loadEvents();
    </script>
</body>
</html>
