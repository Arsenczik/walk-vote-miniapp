<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk Vote App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
    --bg-dark: #000205;
    --accent-blue: #0047ff;
    --glow-blue: rgba(0, 71, 255, 0.6);
    --glass-bg: rgba(255, 255, 255, 0.05);
    --text-main: #ffffff;
}

body {
    margin: 0;
    padding: 20px;
    background-color: var(--bg-dark);
    background-image: radial-gradient(circle at center, #001a4d 0%, var(--bg-dark) 70%);
    color: var(--text-main);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
}

/* Карточка ивента */
.event-card {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px var(--glow-blue);
    margin-bottom: 25px;
}

h1 { font-size: 24px; margin-top: 0; text-shadow: 0 0 10px var(--accent-blue); }
.info-row { margin: 10px 0; font-size: 14px; opacity: 0.9; }

/* Кнопки */
.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn {
    background: linear-gradient(45deg, #002d9c, var(--accent-blue));
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
}
.btn:active { transform: scale(0.95); }
.btn.maybe { background: rgba(255, 255, 255, 0.1); }

/* Список участников */
.participants-list {
    margin-top: 20px;
}
.participant-tag {
    display: inline-block;
    background: rgba(0, 71, 255, 0.2);
    padding: 5px 12px;
    border-radius: 15px;
    margin: 5px;
    font-size: 13px;
    border: 1px solid var(--accent-blue);
}

    </style>
</head>
<body>

    <div id="user-info" class="user-card">
        <h2 id="greeting">Привет!</h2>
    </div>

    <h3>За что голосуем?</h3>
    <button class="btn" onclick="sendVote('Вариант А')">Голосовать за А</button>
    <button class="btn" onclick="sendVote('Вариант Б')">Голосовать за Б</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачивает приложение на весь экран

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('greeting').innerText = `Привет, ${user.first_name}! 👋`;
        }

        function sendVote(option) {
            // Отправляем данные обратно в бота или просто закрываем
            tg.showConfirm(`Вы выбрали: ${option}. Подтвердить?`, (ok) => {
                if (ok) {
                    // Здесь мы можем отправить данные на твой сервер в будущем
                    tg.sendData(option); // Отправляет строку боту и закрывает Mini App
                }
            });
        }
    </script>
</body>
</html>
