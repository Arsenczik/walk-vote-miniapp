<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Event Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Пульс комьюнити -->
    <div class="pulse-bar">
        <div class="pulse-text"></div>
    </div>

    <div class="container">
        <!-- Шапка -->
        <header>
            <h1>🔥 Тусовки</h1>
            <button class="create-btn" onclick="showCreateForm()">+</button>
        </header>

        <!-- Форма создания (скрыта по умолчанию) -->
        <div class="create-form" id="createForm">
            <div class="form-card">
                <h2>Новая движуха</h2>
                <input type="text" id="eventName" placeholder="Название..." maxlength="40">
                <input type="text" id="eventDesc" placeholder="Описание (опционально)" maxlength="120">
                
                <div class="category-picker">
                    <span class="cat-option" data-cat="🍖">🍖</span>
                    <span class="cat-option" data-cat="🎬">🎬</span>
                    <span class="cat-option" data-cat="🌊">🌊</span>
                    <span class="cat-option" data-cat="🍻">🍻</span>
                    <span class="cat-option" data-cat="🎲">🎲</span>
                    <span class="cat-option" data-cat="🎂">🎂</span>
                    <span class="cat-option" data-cat="🎸">🎸</span>
                    <span class="cat-option" data-cat="🏀">🏀</span>
                </div>

                <input type="datetime-local" id="eventDate">
                
                <div class="form-actions">
                    <button onclick="hideCreateForm()">❌</button>
                    <button onclick="createEvent()">Создать ✅</button>
                </div>
            </div>
        </div>

        <!-- Сетка событий -->
        <div class="events-grid" id="eventsGrid">
            <!-- Event Cards будут тут -->
        </div>

        <!-- Детали события (модалка) -->
        <div class="modal-overlay" id="eventModal">
            <div class="modal-card" id="modalContent">
                <!-- Контент будет заполняться через JS -->
            </div>
        </div>

        <!-- Мой профиль -->
        <div class="profile-tab" onclick="showMyProfile()">
            <span>👤</span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
