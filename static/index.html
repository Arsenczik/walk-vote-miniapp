<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Events</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      padding: 10px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .btn {
      background: #2ea6ff;
      border: none;
      padding: 10px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .link {
      color: #2ea6ff;
      text-decoration: none;
    }

    .participants {
      margin-top: 10px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

<h2>🔥 События</h2>
<div id="events"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user || { first_name: "Anon" };

async function loadEvents() {
  const res = await fetch("/api/events");
  const events = await res.json();

  const container = document.getElementById("events");
  container.innerHTML = "";

  for (let e of events) {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${e.title}</div>
      <div>📅 ${e.date}</div>
      <div>📍 ${e.location}</div>
      <a class="link" href="${e.maps_url}" target="_blank">Открыть в картах</a>

      <button class="btn" onclick="join(${e.id})">Я иду</button>

      <div class="participants" id="p-${e.id}">Загрузка...</div>
    `;

    container.appendChild(div);
    loadParticipants(e.id);
  }
}

async function join(event_id) {
  await fetch("/api/join", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      event_id,
      username: user.username || user.first_name
    })
  });

  loadParticipants(event_id);
}

async function loadParticipants(event_id) {
  const res = await fetch(`/api/participants/${event_id}`);
  const users = await res.json();

  document.getElementById(`p-${event_id}`).innerText =
    "👥 Идут: " + (users.length ? users.join(", ") : "пока никто");
}

loadEvents();
</script>

</body>
</html>
